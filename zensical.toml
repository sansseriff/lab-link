[project]
site_name = "lab-link"
site_url = "https://sansseriff.github.io/lab-link/"
site_description = "Server-authoritative synchronization for laboratory instrument control."
site_author = "Andrew Mueller"
docs_dir = "docs"
site_dir = "site"
dev_addr = "localhost:8000"

[project.theme]
variant = "modern"

# Palette toggle for automatic (system) mode — listed first so it is the
# default on first visit
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"
